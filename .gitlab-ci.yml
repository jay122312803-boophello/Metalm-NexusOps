stages:
  - deploy

deploy:
  stage: deploy
  image: registry.xuelangyun.com/shuzhi-amd64/alpine:3.20
  tags:
    - nexus-tag

  only:
    refs:
      - master
    variables:
      - $NEXUSOPS_MANUAL_DEPLOY == "1"

  before_script:
    - sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
    - apk add --no-cache openssh-client rsync curl jq git ca-certificates
    - eval $(ssh-agent -s)
    - echo "$SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config

  script:
    - |
      set -eu
      (set -o pipefail) 2>/dev/null && set -o pipefail
      : "${NEXUSOPS_SOURCE_REPO_URL:?NEXUSOPS_SOURCE_REPO_URL is required}"
      : "${NEXUSOPS_SOURCE_REPO_REF:=master}"
      : "${INPUT_DIR:=./}"
      : "${DEST_DIR:?DEST_DIR is required}"
      : "${SERVER_HOST:?SERVER_HOST is required}"
      : "${SERVER_USER:=metalm}"
      if [ -z "${CUSTOM_DEPLOY_SCRIPT:-}" ]; then
        echo "!! [NexusOps] CUSTOM_DEPLOY_SCRIPT 为空：拒绝执行，避免假成功"
        exit 22
      fi
      NEXUSOPS_API_BASE_URL="$(printf "%s" "${NEXUSOPS_API_BASE_URL:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
      NEXUSOPS_CONFIG_ZIP_URL="$(printf "%s" "${NEXUSOPS_CONFIG_ZIP_URL:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
      api_base="${NEXUSOPS_API_BASE_URL:-}"
      if [ -n "${api_base:-}" ]; then
        case "${api_base}" in
          http://*|https://*) ;;
          *) echo "!! [NexusOps] NEXUSOPS_API_BASE_URL 非法: 必须是 http/https"; exit 3 ;;
        esac
      fi
      if [ -n "${api_base:-}" ] && [ -n "${NEXUSOPS_CONFIG_ZIP_URL:-}" ]; then
        path="$(printf "%s" "$NEXUSOPS_CONFIG_ZIP_URL" | sed -E 's#^[a-zA-Z]+://[^/]+##')"
        NEXUSOPS_CONFIG_ZIP_URL="${api_base%/}${path}"
      fi
      if [ -n "${NEXUSOPS_CONFIG_ZIP_URL:-}" ]; then
        case "$NEXUSOPS_CONFIG_ZIP_URL" in
          http://*|https://*) ;;
          *) echo "!! [NexusOps] NEXUSOPS_CONFIG_ZIP_URL 非法: 必须是 http/https 直链"; exit 3 ;;
        esac
      fi

      if [ -n "${NEXUSOPS_CONFIG_ZIP_URL:-}" ]; then
        if [ -z "${NEXUSOPS_API_TOKEN:-}" ]; then
          echo "!! [NexusOps] 下载配置需要鉴权：未收到 NEXUSOPS_API_TOKEN"
          exit 22
        fi
      fi

      if [ "$SERVER_HOST" = "10.88.36.61" ]; then
        case "${DEST_DIR%/}/" in
          /home/metalm/deploy/NexusOps/*) ;;
          *) echo "!! [NexusOps] 安全拦截: 10.88.36.61 仅允许部署到 /home/metalm/deploy/NexusOps/ 下，当前 DEST_DIR=$DEST_DIR"; exit 1 ;;
        esac
      fi

      echo "INPUT_DIR=$INPUT_DIR"
      echo "DEST_DIR=$DEST_DIR"
      echo "SERVER=$SERVER_USER@$SERVER_HOST"
      echo "SOURCE_REPO=$NEXUSOPS_SOURCE_REPO_URL@$NEXUSOPS_SOURCE_REPO_REF"
      echo "====== [NexusOps] Start Sync ======"

      echo "====== [NexusOps] Fetch Source Repo ======"
      src_dir="/tmp/nexusops-src"
      rm -rf "$src_dir"
      mkdir -p "$src_dir"
      src_url="$NEXUSOPS_SOURCE_REPO_URL"
      if echo "$src_url" | grep -Eq '^https?://'; then
        if [ -n "${NEXUSOPS_GIT_HTTP_TOKEN:-}" ]; then
          src_url="$(printf "%s" "$src_url" | sed -E "s#^https?://#https://oauth2:${NEXUSOPS_GIT_HTTP_TOKEN}@#")"
        else
          : "${CI_JOB_TOKEN:?CI_JOB_TOKEN is required to clone source repo}"
          src_url="$(printf "%s" "$src_url" | sed -E "s#^https?://#https://gitlab-ci-token:${CI_JOB_TOKEN}@#")"
        fi
      fi
      git clone --depth 1 --branch "$NEXUSOPS_SOURCE_REPO_REF" "$src_url" "$src_dir/repo"

      sub="${INPUT_DIR#./}"
      if [ -z "${sub:-}" ] || [ "$sub" = "." ]; then
        local_input="$src_dir/repo"
      else
        local_input="$src_dir/repo/$sub"
      fi
      if [ ! -d "$local_input" ]; then
        echo "!! [NexusOps] INPUT_DIR 在来源仓库中不存在: $INPUT_DIR"
        echo "!! [NexusOps] 实际路径: $local_input"
        exit 22
      fi

      printf "%s\n" "${CUSTOM_DEPLOY_SCRIPT}" > remote_executor.sh
      chmod 600 remote_executor.sh

      ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p '${DEST_DIR%/}'"

      rsync -rz --no-perms --no-owner --no-group "${local_input%/}/" "$SERVER_USER@$SERVER_HOST:${DEST_DIR%/}/"
      echo "====== [NexusOps] Sync Done ======"

      ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p '${DEST_DIR%/}/.nexusops'"
      rsync -rz --no-perms --no-owner --no-group remote_executor.sh "$SERVER_USER@$SERVER_HOST:${DEST_DIR%/}/.nexusops/remote_executor.sh"

      if [ -n "${NEXUSOPS_CONFIG_ZIP_URL:-}" ] && [ "${test:-}" != "true" ]; then
        echo "====== [NexusOps] Download Configs ======"
        tmp_local="/tmp/nexusops-configs.zip"
        rm -f "$tmp_local"
        curl -fsSL -H "Authorization: Bearer ${NEXUSOPS_API_TOKEN}" "$NEXUSOPS_CONFIG_ZIP_URL" -o "$tmp_local"
        rsync -rz --no-perms --no-owner --no-group "$tmp_local" "$SERVER_USER@$SERVER_HOST:${DEST_DIR%/}/.nexusops/configs.zip"
        rm -f "$tmp_local"
      fi

      ssh "$SERVER_USER@$SERVER_HOST" "set -e; \
        if [ \"${test:-}\" = \"true\" ]; then \
          echo '====== [NexusOps] Test Mode: Skip Config Inject ======'; \
        elif [ -n \"${NEXUSOPS_CONFIG_ZIP_URL:-}\" ]; then \
          echo '====== [NexusOps] Inject Configs ======'; \
          tmp=\"${DEST_DIR%/}/.nexusops/configs.zip\"; \
          mkdir -p \"${DEST_DIR%/}/.nexusops\"; \
          if [ -s \"\$tmp\" ]; then \
            if command -v unzip >/dev/null 2>&1; then unzip -o \"\$tmp\" -d \"${DEST_DIR%/}\" >/dev/null; \
            elif command -v python3 >/dev/null 2>&1; then python3 -m zipfile -e \"\$tmp\" \"${DEST_DIR%/}\" >/dev/null; \
            else echo unzip/python3 not found; exit 1; fi; \
            rm -f \"\$tmp\"; \
          else \
            echo \"!! [NexusOps] 配置包不存在或为空: \$tmp\"; \
            exit 22; \
          fi; \
          echo '====== [NexusOps] Configs Ready ======'; \
        fi; \
        echo '====== [NexusOps] Execute Script ======'; \
        cd \"${DEST_DIR%/}\"; \
        chmod 700 .nexusops/remote_executor.sh; \
        if command -v bash >/dev/null 2>&1; then bash .nexusops/remote_executor.sh; else sh .nexusops/remote_executor.sh; fi; \
        echo '====== [NexusOps] Script Done ======'; \
        rm -f .nexusops/remote_executor.sh"
  
  environment:
    name: development
