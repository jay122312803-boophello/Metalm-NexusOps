stages:
  - deploy

deploy:
  stage: deploy
  image: registry.xuelangyun.com/shuzhi-amd64/alpine:3.20
  tags:
    - nexus-tag

  only:
    refs:
      - master

  before_script:
    - sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
    - apk add --no-cache openssh-client rsync curl
    - eval $(ssh-agent -s)
    - echo "$SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config

  script:
    - |
      : "${INPUT_DIR:=./}"
      : "${DEST_DIR:?DEST_DIR is required}"
      : "${SERVER_HOST:?SERVER_HOST is required}"
      : "${SERVER_USER:=metalm}"
      NEXUSOPS_CONFIG_ZIP_URL="$(printf "%s" "${NEXUSOPS_CONFIG_ZIP_URL:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
      if [ -n "${NEXUSOPS_CONFIG_ZIP_URL:-}" ]; then
        case "$NEXUSOPS_CONFIG_ZIP_URL" in
          http://*|https://*) ;;
          *) echo "!! [NexusOps] NEXUSOPS_CONFIG_ZIP_URL 非法: 必须是 http/https 直链"; exit 3 ;;
        esac
      fi

      if [ "$SERVER_HOST" = "10.88.36.61" ]; then
        case "${DEST_DIR%/}/" in
          /home/metalm/deploy/NexusOps/*) ;;
          *) echo "!! [NexusOps] 安全拦截: 10.88.36.61 仅允许部署到 /home/metalm/deploy/NexusOps/ 下，当前 DEST_DIR=$DEST_DIR"; exit 1 ;;
        esac
      fi

      echo "INPUT_DIR=$INPUT_DIR"
      echo "DEST_DIR=$DEST_DIR"
      echo "SERVER=$SERVER_USER@$SERVER_HOST"
      echo "====== [NexusOps] Start Sync ======"

      printf "%s\n" "${CUSTOM_DEPLOY_SCRIPT:-}" > remote_executor.sh
      chmod 600 remote_executor.sh

      ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p '${DEST_DIR%/}'"

      rsync -rz --no-perms --no-owner --no-group "${INPUT_DIR%/}/" "$SERVER_USER@$SERVER_HOST:${DEST_DIR%/}/"
      echo "====== [NexusOps] Sync Done ======"

      ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p '${DEST_DIR%/}/.nexusops'"
      rsync -rz --no-perms --no-owner --no-group remote_executor.sh "$SERVER_USER@$SERVER_HOST:${DEST_DIR%/}/.nexusops/remote_executor.sh"

      ssh "$SERVER_USER@$SERVER_HOST" "set -e; \
        if [ -n \"${NEXUSOPS_CONFIG_ZIP_URL:-}\" ]; then \
          echo '====== [NexusOps] Inject Configs ======'; \
          tmp=\"${DEST_DIR%/}/.nexusops/configs.zip\"; \
          tmp_local=\"/tmp/nexusops-configs.zip\"; \
          rm -f \"\$tmp_local\"; \
          mkdir -p \"${DEST_DIR%/}/.nexusops\"; \
          if command -v curl >/dev/null 2>&1; then \
            curl -fsSL \"$NEXUSOPS_CONFIG_ZIP_URL\" -o \"\$tmp_local\"; \
          elif command -v wget >/dev/null 2>&1; then \
            wget -qO \"\$tmp_local\" \"$NEXUSOPS_CONFIG_ZIP_URL\"; \
          else \
            true; \
          fi; \
          if [ -s \"\$tmp_local\" ]; then \
            if ! mv -f \"\$tmp_local\" \"$tmp\"; then \
              echo \"!! [NexusOps] 无法写入: $tmp\"; \
              ls -ld \"${DEST_DIR%/}\" \"${DEST_DIR%/}/.nexusops\" || true; \
              df -h \"${DEST_DIR%/}\" || true; \
              exit 23; \
            fi; \
            if command -v unzip >/dev/null 2>&1; then unzip -o \"$tmp\" -d \"${DEST_DIR%/}\" >/dev/null; \
            elif command -v python3 >/dev/null 2>&1; then python3 -m zipfile -e \"$tmp\" \"${DEST_DIR%/}\" >/dev/null; \
            else echo unzip/python3 not found; exit 1; fi; \
            rm -f \"$tmp\"; \
          fi; \
          echo '====== [NexusOps] Configs Ready ======'; \
        fi; \
        echo '====== [NexusOps] Execute Script ======'; \
        cd \"${DEST_DIR%/}\"; \
        chmod 700 .nexusops/remote_executor.sh; \
        if command -v bash >/dev/null 2>&1; then bash .nexusops/remote_executor.sh; else sh .nexusops/remote_executor.sh; fi; \
        echo '====== [NexusOps] Script Done ======'; \
        rm -f .nexusops/remote_executor.sh"
  
  environment:
    name: development
