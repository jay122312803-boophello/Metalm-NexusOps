stages:
  - deploy

deploy_backend_frontend:
  stage: deploy
  # 直接使用你们私有仓库的镜像作为 CI 跑腿环境
  image: registry.xuelangyun.com/shuzhi-amd64/alpine:3.20
  tags:
    - nexus-tag

  only:
    refs:
      - master

  before_script:
    # 1. 安装必要的工具 (注意：如果这里报错说连不上源，说明内网也屏蔽了 apk 的公网源)
    - sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
    - apk add --no-cache openssh-client rsync
    # 2. 启动 ssh-agent 并加载私钥
    - eval $(ssh-agent -s)
    - echo "$SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    # 3. 配置 SSH 忽略主机指纹检查
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config

  script:
    # 4. 同步文件到服务器
    - echo "开始同步文件到服务器..."
    - rsync -avz ./develop/backend_frontend/ $SERVER_USER@$SERVER_HOST:/home/metalm/deploy/NexusOps/
    
    # 5. SSH 登录服务器执行部署
    - echo "登录服务器执行部署..."
    - |
      ssh $SERVER_USER@$SERVER_HOST "
        # 进入目标目录
        cd /home/metalm/deploy/NexusOps/
        
        # 赋予脚本执行权限
        chmod +x down.sh up.sh
        
        # 服务器登录私有镜像仓库
        docker login registry.xuelangyun.com -u \$REGISTRY_USER -p \$REGISTRY_PASSWORD
        
        # 确保网络存在
        docker network create metalm-dev-net || true
        
        # 停止并拉取启动
        sh down.sh
        docker-compose pull
        sh up.sh
      "
  
  environment:
    name: development