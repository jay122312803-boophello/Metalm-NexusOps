services:
  backend:
    image: ${NEXUSOPS_BACKEND_IMAGE:-registry.xuelangyun.com/shuzhi-amd64/metalm/nexusops-backend:latest}
    platform: ${NEXUSOPS_PLATFORM:-linux/amd64}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${NEXUSOPS_PG_PASS:-metalm2024}@${NEXUSOPS_PG_HOST:-nexusops-pg}:5432/nexusops_db
      NEXUSOPS_DB_INIT: "0"
    ports:
      - "18070:8000"
    networks:
      - nexusops-net

  frontend:
    image: ${NEXUSOPS_FRONTEND_IMAGE:-registry.xuelangyun.com/shuzhi-amd64/metalm/nexusops-frontend:latest}
    platform: ${NEXUSOPS_PLATFORM:-linux/amd64}
    restart: unless-stopped
    ports:
      - "18488:80"
    depends_on:
      - backend
    networks:
      - nexusops-net

networks:
  nexusops-net:
    name: nexusops-dev-net
    external: true
