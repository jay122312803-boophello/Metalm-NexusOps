name: metalm-nexusops

services:
  backend:
    image: ${NEXUSOPS_BACKEND_IMAGE:-registry.xuelangyun.com/shuzhi-amd64/metalm/nexusops-backend:latest}
    platform: ${NEXUSOPS_PLATFORM:-linux/amd64}
    container_name: nexusops-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${NEXUSOPS_PG_PASS:-metalm2024}@${NEXUSOPS_PG_HOST:-nexusops-pg}:5432/nexusops_db
      NEXUSOPS_DB_INIT: ${NEXUSOPS_DB_INIT:-0}
      NEXUSOPS_ADMIN_USER: ${NEXUSOPS_ADMIN_USER:-admin}
      NEXUSOPS_ADMIN_PASS: ${NEXUSOPS_ADMIN_PASS:-admin123}
      NEXUSOPS_JWT_SECRET: ${NEXUSOPS_JWT_SECRET:-nexusops-change-me}
      NEXUSOPS_TZ: ${NEXUSOPS_TZ:-Asia/Shanghai}
      TZ: ${NEXUSOPS_TZ:-Asia/Shanghai}
      REDIS_URL: redis://:${NEXUSOPS_REDIS_PASS:-metalm2024}@${NEXUSOPS_REDIS_HOST:-nexusops-redis}:6379/0
    ports:
      - "18070:8000"
    networks:
      - nexusops-net

  frontend:
    image: ${NEXUSOPS_FRONTEND_IMAGE:-registry.xuelangyun.com/shuzhi-amd64/metalm/nexusops-frontend:latest}
    platform: ${NEXUSOPS_PLATFORM:-linux/amd64}
    container_name: nexusops-frontend
    restart: unless-stopped
    ports:
      - "18488:80"
    depends_on:
      - backend
    networks:
      - nexusops-net

networks:
  nexusops-net:
    name: nexusops-dev-net
    external: true
