<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusOps | 雪浪河图·工匠大模型</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 雪浪河图风格配色 - 2.0 */
      --primary: #16a34a;       /* 核心绿 */
      --primary-dark: #15803d;
      --primary-light: #dcfce7;
      --bg-root: #f8fafc;       /* 更干净的背景 */
      --bg-sidebar: #ffffff;    /* 白底侧边栏 */
      --bg-card: #ffffff;
      --text-main: #0f172a;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --content-max: 1440px;
      
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;

      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -1px rgb(0 0 0 / 0.06);
    }

    * { box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    #root { flex: 1; min-width: 0; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      margin: 0; padding: 0; 
      background: var(--bg-root); 
      color: var(--text-main); 
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* 布局框架 */
    .app-layout { display: flex; width: 100%; height: 100%; flex: 1; min-width: 0; }
    
    /* 左侧导航 */
    .sidebar {
      width: 240px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 20;
    }
    .brand {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 18px;
      color: var(--text-main);
      gap: 10px;
    }
    .brand i { color: var(--primary); font-size: 20px; }
    
    .menu { padding: 16px 12px; flex: 1; }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      color: var(--text-sub);
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      margin-bottom: 4px;
    }
    .menu-item:hover { background: #f1f5f9; color: var(--text-main); }
    .menu-item.active { 
      background: var(--primary-light); 
      color: var(--primary-dark); 
    }
    .menu-item i { width: 20px; text-align: center; }

    .user-panel {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 50%;
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600;
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      min-width: 0;
    }

    /* 顶栏 (Header) */
    .top-header {
      height: 64px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      width: 100%;
      justify-content: flex-start;
      padding: 0;
      flex-shrink: 0;
    }
    .top-header-inner {
      width: 100%;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex: 1;
    }
    .breadcrumb { 
      font-size: 14px; color: var(--text-sub);
      display: flex; align-items: center; gap: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .breadcrumb .current { color: var(--text-main); font-weight: 600; }
    
    /* 滚动视图 */
    .scroll-view {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
    }
    .scroll-inner {
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 0 32px;
    }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      width: 100%;
    }
    .page-title { margin: 0; font-size: 24px; }
    .page-actions { display: flex; gap: 12px; align-items: center; }

    .tabs {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f1f5f9;
    }
    .tab {
      border: 0;
      background: transparent;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
    }
    .tab.active {
      background: white;
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
    }

    /* 通用组件 */
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      overflow: hidden;
    }
    .card:hover { box-shadow: var(--shadow-md); }
    
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-outline { background: white; border-color: var(--border); color: var(--text-main); }
    .btn-outline:hover { background: #f8fafc; border-color: #cbd5e1; }
    .btn-ghost { background: transparent; color: var(--text-sub); }
    .btn-ghost:hover { background: #f1f5f9; color: var(--text-main); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* 状态指示灯 */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.online { background: var(--success); box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
    .status-dot.offline { background: var(--danger); }
    .status-dot.busy { background: var(--info); animation: pulse 1.5s infinite; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    /* --- 模块：系统设置 --- */
    .grid-servers {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 360px));
      gap: 24px;
      justify-content: start;
    }
    .server-card {
      padding: 20px;
      position: relative;
      cursor: pointer;
    }
    .server-card:hover { border-color: var(--primary); }
    .server-icon {
      width: 48px; height: 48px;
      background: #f0fdf4;
      border-radius: 10px;
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
    }
    .server-status { position: absolute; top: 20px; right: 20px; }
    
    .repo-table { width: 100%; border-collapse: collapse; }
    .repo-table th { text-align: left; padding: 12px 16px; color: var(--text-sub); font-weight: 500; font-size: 13px; border-bottom: 1px solid var(--border); }
    .repo-table td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .repo-table tr:last-child td { border-bottom: none; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-family: monospace; }
    .badge-blue { background: #eff6ff; color: #1d4ed8; }
    .badge-gray { background: #f1f5f9; color: #475569; }
    .badge-prod { background: rgba(239,68,68,0.10); color: #b91c1c; }
    .badge-dev { background: rgba(16,185,129,0.10); color: #047857; }
    .badge-test { background: rgba(59,130,246,0.10); color: #1d4ed8; }

    /* --- 模块：部署大盘 --- */
    .deploy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 420px));
      gap: 24px;
      justify-content: start;
    }
    .task-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      position: relative;
      overflow: visible;
    }
    .task-card:hover { transform: translateY(-2px); }
    .task-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to right, #ffffff, #f8fafc);
    }
    .task-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #64748b;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .icon-btn:hover { background: #f1f5f9; color: #0f172a; }
    .menu-pop {
      position: absolute;
      top: 46px;
      right: 16px;
      min-width: 160px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-md);
      padding: 6px;
      z-index: 10;
    }
    .menu-item-btn {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 10px 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-main);
    }
    .menu-item-btn:hover { background: #f1f5f9; }
    .menu-item-danger { color: var(--danger); }
    .task-body { padding: 20px; flex: 1; }
    .task-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: #f8fafc;
      font-size: 13px; color: var(--text-sub);
    }
    .info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 14px; color: var(--text-sub); }
    .info-row i { width: 16px; color: #94a3b8; }
    .info-val { color: var(--text-main); font-weight: 500; }

    /* --- 模块：详情 (Cockpit) --- */
    .cockpit-grid { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
    .status-panel { display: flex; flex-direction: column; gap: 32px; padding: 24px; }
    .status-node { display: flex; gap: 16px; position: relative; }
    .status-node:not(:last-child)::after {
      content: ''; position: absolute; left: 20px; top: 48px; bottom: -24px; width: 2px; background: #e2e8f0;
    }
    .status-node.flow:not(:last-child)::after {
      background: linear-gradient(180deg, rgba(59,130,246,0), rgba(59,130,246,0.9), rgba(59,130,246,0));
      background-size: 100% 200%;
      animation: flowline 1.6s ease-in-out infinite;
    }
    @keyframes flowline { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }
    .node-icon { 
      width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; color: #94a3b8;
      display: flex; align-items: center; justify-content: center; font-size: 18px; z-index: 1;
      border: 2px solid white; box-shadow: 0 0 0 1px #e2e8f0;
    }
    .node-icon.active { background: #dcfce7; color: var(--primary); border-color: var(--primary); }
    .node-icon.pulsing { animation: pulseRing 1.2s ease-in-out infinite; }
    @keyframes pulseRing {
      0% { box-shadow: 0 0 0 1px #e2e8f0, 0 0 0 0 rgba(59,130,246,0.0); }
      50% { box-shadow: 0 0 0 1px #e2e8f0, 0 0 0 8px rgba(59,130,246,0.12); }
      100% { box-shadow: 0 0 0 1px #e2e8f0, 0 0 0 0 rgba(59,130,246,0.0); }
    }
    .node-icon.spin i { animation: spinGear 1s linear infinite; }
    @keyframes spinGear { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .deploy-meta {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px dashed var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 12px;
      color: var(--text-sub);
    }
    .deploy-meta code { font-family: 'Fira Code', monospace; font-size: 12px; color: #0f172a; background: #f1f5f9; padding: 2px 6px; border-radius: 6px; }
    .node-content h4 { margin: 0 0 4px 0; font-size: 14px; }
    .node-content p { margin: 0; font-size: 12px; color: var(--text-sub); }

    .terminal-window {
      background: #1e293b; color: #f8fafc; border-radius: 8px; 
      font-family: 'Fira Code', monospace; font-size: 13px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .term-header { padding: 8px 12px; background: #0f172a; color: #94a3b8; font-size: 12px; display: flex; align-items: center; justify-content: space-between; }
    .term-actions { display: flex; align-items: center; gap: 6px; }
    .term-action-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #94a3b8;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .term-action-btn:hover { background: rgba(148,163,184,0.12); color: #e2e8f0; }
    .term-body { padding: 16px; flex: 1; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
    .log-line { margin-bottom: 2px; }
    .log-info { color: #94a3b8; }
    .log-success { color: #4ade80; }
    .log-error { color: #f87171; }

    .terminal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .terminal-full {
      width: min(1200px, calc(100vw - 48px));
      height: min(760px, calc(100vh - 48px));
      box-shadow: 0 16px 60px rgba(0,0,0,0.4);
      border-radius: 12px;
      overflow: hidden;
    }

    .vars-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(59,130,246,0.10);
      color: #1d4ed8;
      cursor: pointer;
      user-select: none;
    }
    .vars-pill:hover { background: rgba(59,130,246,0.14); }
    .code-pre {
      background: #0b1220;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 12px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      overflow: auto;
      white-space: pre;
      border: 1px solid rgba(148,163,184,0.16);
    }

    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 40px; }
    .input-icon {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }
    .input-icon.ok { color: var(--success); }
    .input-icon.bad { color: var(--danger); }
    .input-icon.neutral { color: #cbd5e1; }
    .input-toggle {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      width: 32px; height: 32px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #94a3b8;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .input-toggle:hover { background: #f1f5f9; color: #0f172a; }

    .kv-table { display: flex; flex-direction: column; gap: 12px; max-height: 260px; overflow: auto; }
    .kv-row { display: grid; grid-template-columns: 240px 1fr; gap: 12px; align-items: start; }
    .kv-key { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; background: #f8fafc; font-family: 'Fira Code', monospace; font-size: 13px; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .kv-textarea { width: 100%; min-height: 120px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: 'Fira Code', monospace; resize: vertical; }

    /* --- 模块：抽屉 (Drawer) --- */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 50;
      backdrop-filter: blur(2px);
      display: flex; justify-content: flex-end;
    }
    .drawer {
      width: 480px; background: white; height: 100%;
      box-shadow: -4px 0 20px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .drawer-header { padding: 20px 24px; border-bottom: 1px solid var(--border); font-size: 18px; font-weight: 600; display: flex; justify-content: space-between; }
    .drawer-body { padding: 24px; flex: 1; overflow-y: auto; }
    .drawer-footer { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }

    /* 表单控件 */
    .form-item { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
    .form-input { 
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; 
      transition: all 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    
    .empty-state { text-align: center; padding: 60px; color: var(--text-sub); }
    .empty-icon { font-size: 48px; color: #cbd5e1; margin-bottom: 16px; }

  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script>
    const e = React.createElement;
    const { useState, useEffect, useRef } = React;

    // --- API Helper ---
    const api = (() => {
      let base = '';

      const parseBody = async (res) => {
        const ct = (res.headers.get('content-type') || '').toLowerCase();
        if (ct.includes('application/json')) return res.json();
        const text = await res.text();
        try { return JSON.parse(text); } catch { return { ok: false, status: res.status, text }; }
      };

      const request = async (method, url, data) => {
        const isAbs = /^https?:\/\//i.test(url);
        const makeUrl = (b) => isAbs ? url : (b + url);

        const opts = { method, headers: {} };
        if (data !== undefined) {
          opts.headers['Content-Type'] = 'application/json';
          opts.body = JSON.stringify(data);
        }

        let res = await fetch(makeUrl(base), opts);

        if (!isAbs && base === '' && /^\/api\//.test(url)) {
          const ct = (res.headers.get('content-type') || '').toLowerCase();
          if (ct.includes('text/html')) {
            base = `${location.protocol}//${location.hostname}:8000`;
            res = await fetch(makeUrl(base), opts);
          }
        }

        return parseBody(res);
      };

      return {
        get: (url) => request('GET', url),
        post: (url, data) => request('POST', url, data),
        del: (url) => request('DELETE', url),
      };
    })();

    // --- 组件：图标 ---
    const Icon = ({ name, style }) => e('i', { className: `fa-solid fa-${name}`, style });

    // --- 模块：抽屉 ---
    function Drawer({ title, onClose, children, footer }) {
      return e('div', { className: 'drawer-overlay', onClick: onClose }, 
        e('div', { className: 'drawer', onClick: ev => ev.stopPropagation() }, [
          e('div', { key: 'head', className: 'drawer-header' }, [
            title,
            e('i', { className: 'fa-solid fa-xmark', style: { cursor: 'pointer', color: '#94a3b8' }, onClick: onClose })
          ]),
          e('div', { key: 'body', className: 'drawer-body' }, children),
          footer ? e('div', { key: 'foot', className: 'drawer-footer' }, footer) : null
        ])
      );
    }

    // --- 页面：系统设置 ---
    function SettingsPage() {
      const [servers, setServers] = useState([]);
      const [repos, setRepos] = useState([]);
      const [drawerType, setDrawerType] = useState(null); // 'server' | 'repo' | null
      const [activeTab, setActiveTab] = useState('servers');
      const [showTriggerToken, setShowTriggerToken] = useState(false);
      const [showPrivateToken, setShowPrivateToken] = useState(false);
      
      const [formServer, setFormServer] = useState({ ssh_user: 'metalm' });
      const [formRepo, setFormRepo] = useState({ branch: 'master' });

      const isValidHost = (v) => {
        const s = (v || '').trim();
        if (!s) return false;
        const ip = /^(25[0-5]|2[0-4]\d|1?\d?\d)(\.(25[0-5]|2[0-4]\d|1?\d?\d)){3}$/;
        const host = /^(?=.{1,253}$)(?!-)([a-zA-Z0-9-]{1,63}(?<!-)\.)+[a-zA-Z]{2,63}$|^[a-zA-Z0-9-]{1,63}$/;
        return ip.test(s) || host.test(s);
      };
      const isValidGitUrl = (v) => {
        const s = (v || '').trim();
        if (!s) return false;
        if (/^https?:\/\//i.test(s)) return true;
        if (/^ssh:\/\//i.test(s)) return true;

    // --- 页面：部署详情 (Cockpit) ---
    function DeployDetail({ taskId, onBack }) {
      const [task, setTask] = useState(null);
      const [server, setServer] = useState(null);
      const [repo, setRepo] = useState(null);

      const [deploying, setDeploying] = useState(false);
      const [logs, setLogs] = useState([]);
      const [activeHistoryId, setActiveHistoryId] = useState(null);
      const [pipelineStatus, setPipelineStatus] = useState('unknown');
      const [terminalFull, setTerminalFull] = useState(false);

      // 初始化加载
      useEffect(() => {
        async function init() {
          const tasks = await api.get('/api/deployments');
          const list = Array.isArray(tasks) ? tasks : [];
          const t = list.find(x => x.id === taskId);
          if (t) {
            setTask(t);
            const servers = await api.get('/api/servers');
            const sv = Array.isArray(servers) ? servers : [];
            setServer(sv.find(x => x.id === t.server_id));
            const repos = await api.get('/api/repos');
            const rp = Array.isArray(repos) ? repos : [];
            setRepo(rp.find(x => x.id === t.repo_id));
          }
        }
        init();
      }, [taskId]);

      // 轮询状态
      useEffect(() => {
        if (!activeHistoryId) return;
        
        const interval = setInterval(async () => {
          try {
            const res = await api.get(`/api/history/${activeHistoryId}/status`);
            const status = res.status;
            setPipelineStatus(status);
            addLog(`>> Pipeline status check: ${status || 'unknown'}`);
            
            if (['success', 'failed', 'canceled'].includes(status)) {
              addLog(`>> Pipeline finished with status: ${status}`);
              setDeploying(false);
              setActiveHistoryId(null);
            }
          } catch(e) {
            addLog(`!! Error checking status: ${e.message}`);
          }
        }, 3000);
        return () => clearInterval(interval);
      }, [activeHistoryId]);

      const addLog = (msg) => {
        setLogs(prev => [...prev, `[${new Date().toLocaleTimeString()}] ${msg}`]);
      };

      const copyText = async (text) => {
        const t = text || '';
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(t);
            return true;
          }
        } catch (_) {}
        try {
          const ta = document.createElement('textarea');
          ta.value = t;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          return ok;
        } catch (_) {
          return false;
        }
      };

      const handleCopyLogs = async () => {
        const ok = await copyText(logs.join('\n'));
        addLog(ok ? '>> Copied logs to clipboard' : '!! Copy failed');
      };
      const handleClearLogs = () => setLogs([]);

      const handleTrigger = async () => {
        if (!confirm('确认触发部署?')) return;
        setDeploying(true);
        setLogs(['>> Initializing deployment sequence...', '>> Connecting to GitLab API...']);
        setPipelineStatus('pending');

        try {
          const res = await api.post(`/api/deployments/${taskId}/trigger`, {});
          if (res.ok) {
            addLog(`>> Trigger successful! Pipeline ID: ${res.pipeline.id}`);
            addLog(`>> Web URL: ${res.pipeline.web_url}`);
            setActiveHistoryId(res.history_id);
          } else {
            addLog(`!! Trigger failed: ${JSON.stringify(res)}`);
            setDeploying(false);
          }
        } catch (e) {
          addLog(`!! Exception: ${e.message}`);
          setDeploying(false);
        }
      };

      if (!task) return e('div', { className: 'empty-state' }, 'Loading...');

      const busy = deploying || pipelineStatus === 'running' || pipelineStatus === 'pending';
      const renderTerminal = (full) => e('div', { className: full ? 'terminal-window terminal-full' : 'terminal-window', style: full ? undefined : { flex: 1, minHeight: 0 } }, [
        e('div', { className: 'term-header' }, [
          e('span', null, `TERMINAL - ${activeHistoryId ? `pipeline #${activeHistoryId}` : 'ssh output stream'}`),
          e('div', { className: 'term-actions' }, [
            e('div', { className: 'term-action-btn', title: full ? '退出全屏' : '全屏查看', onClick: () => setTerminalFull(v => !v) }, e(Icon, { name: full ? 'compress' : 'expand' })),
            e('div', { className: 'term-action-btn', title: '复制日志', onClick: handleCopyLogs }, e(Icon, { name: 'copy' })),
            e('div', { className: 'term-action-btn', title: '清空面板', onClick: handleClearLogs }, e(Icon, { name: 'trash' }))
          ])
        ]),
        e('div', { className: 'term-body', ref: (el) => { if(el) el.scrollTop = el.scrollHeight; } }, [
          logs.length === 0 ? e('span', { className: 'log-info' }, '> Ready to deploy...') : null,
          logs.map((line, i) => e('div', { key: i, className: 'log-line' }, line))
        ])
      ]);

      return e('div', { style: { height: '100%', display: 'flex', flexDirection: 'column' } }, [
        // Header
        e('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 0 20px 0' } }, [
          e('div', { style: { display: 'flex', alignItems: 'center', gap: 16 } }, [
            e('button', { className: 'btn btn-ghost', onClick: onBack }, [e(Icon, { name: 'arrow-left' }), '返回']),
            e('h2', { style: { margin: 0 } }, task.name)
          ]),
          e('button', { className: 'btn btn-primary', onClick: handleTrigger, disabled: deploying }, [
            e(Icon, { name: deploying ? 'spinner fa-spin' : 'rocket' }), 
            deploying ? '部署中...' : '触发部署'
          ])
        ]),

        // Main Grid
        e('div', { className: 'cockpit-grid' }, [
          // Left: Status Panel
          e('div', { className: 'card status-panel' }, [
            // Node 1: Repo
            e('div', { className: `status-node ${busy ? 'flow' : ''}` }, [
              e('div', { className: `node-icon active` }, e(Icon, { name: 'code-branch' })),
              e('div', { className: 'node-content' }, [
                e('h4', null, '仓库连通性'),
                e('p', null, repo?.name),
                e('p', null, `Branch: ${repo?.branch}`),
                e('div', { style: { marginTop: 4, color: 'var(--success)', fontSize: 12 } }, [e(Icon, { name: 'check' }), ' Connected'])
              ])
            ]),
            // Node 2: Pipeline
            e('div', { className: `status-node ${busy ? 'flow' : ''}` }, [
              e('div', { className: `node-icon ${busy ? 'active pulsing spin' : ''}` }, e(Icon, { name: 'gears' })),
              e('div', { className: 'node-content' }, [
                e('h4', null, 'CI/CD 流水线'),
                e('p', null, pipelineStatus === 'unknown' ? 'Ready' : `Status: ${pipelineStatus}`),
                activeHistoryId && e('p', null, 'Monitoring...')
              ])
            ]),
            // Node 3: Server
            e('div', { className: 'status-node' }, [
              e('div', { className: `node-icon active` }, e(Icon, { name: 'server' })),
              e('div', { className: 'node-content' }, [
                e('h4', null, '目标服务器'),
                e('p', null, server?.name),
                e('p', null, server?.address),
                e('div', { style: { marginTop: 4, color: 'var(--success)', fontSize: 12 } }, [e(Icon, { name: 'check' }), ' Online'])
              ])
            ]),
            e('div', { className: 'deploy-meta' }, [
              e('div', null, ['Branch: ', e('code', null, repo?.branch || '-')]),
              e('div', null, ['SERVER_HOST: ', e('code', null, server?.address || '-')]),
              e('div', null, ['SERVER_USER: ', e('code', null, server?.ssh_user || 'metalm')]),
              e('div', null, ['Deploy Path: ', e('code', null, server?.deploy_path || '-')]),
            ])
          ]),

          // Right: Terminal & Config
          e('div', { style: { display: 'flex', flexDirection: 'column', gap: 24, height: '100%', minHeight: 0 } }, [
            renderTerminal(false)
          ])
        ]),
        terminalFull && e('div', { className: 'terminal-overlay', onClick: () => setTerminalFull(false) }, 
          e('div', { onClick: ev => ev.stopPropagation() }, renderTerminal(true))
        )
      ]);
    }

    function HistoryPage() {

        const load = async () => {
          const h = await api.get('/api/history');
          setHistory(h.history || []);
          setServers(await api.get('/api/servers'));
          setRepos(await api.get('/api/repos'));
        };
        load();
        const t = setInterval(load, 8000);
        return () => clearInterval(t);
      }, []);

      const getStatusIcon = (status) => {
        if (status === 'success') return e(Icon, { name: 'circle-check', style: { color: 'var(--success)', fontSize: 20 } });
        if (status === 'failed') return e(Icon, { name: 'circle-xmark', style: { color: 'var(--danger)', fontSize: 20 } });
        if (status === 'canceled') return e(Icon, { name: 'ban', style: { color: 'var(--warning)', fontSize: 20 } });
        if (status === 'running' || status === 'pending') return e(Icon, { name: 'spinner fa-spin', style: { color: 'var(--info)', fontSize: 20 } });
        return e(Icon, { name: 'circle-question', style: { color: '#cbd5e1', fontSize: 20 } });
      };

      return e('div', null, [
        e('div', { className: 'page-head' }, [
          e('h2', { className: 'page-title' }, '审计日志'),
          e('div', { className: 'page-actions' }, [
            e('select', { className: 'form-input', style: { width: 150 } }, [e('option', null, '全部服务器')]),
            e('select', { className: 'form-input', style: { width: 150 } }, [e('option', null, '全部状态')])
          ])
        ]),

        e('div', { className: 'card' }, 
          e('table', { className: 'repo-table', style: { width: '100%' } }, [
            e('thead', null, e('tr', null, [
              e('th', { style: { width: 60 } }, '状态'),
              e('th', null, '任务说明'),
              e('th', null, 'CI 信息'),
              e('th', { style: { width: '42%' } }, '变量参数'),
              e('th', null, '触发时间')
            ])),
            e('tbody', null, history.map(h => {
              const sName = h.server_snapshot?.name || 'Unknown Server';
              const rName = h.repo_snapshot?.name || 'Unknown Repo';
              return e('tr', { key: h.id }, [
                e('td', null, getStatusIcon(h.status)),
                e('td', null, [
                  e('div', { style: { fontWeight: 500 } }, `Deploy ${rName}`),
                  e('div', { style: { fontSize: 12, color: 'var(--text-sub)' } }, `To: ${sName}`)
                ]),
                e('td', null, [
                  e('div', null, `Pipeline #${h.pipeline_id}`),
                  h.web_url && e('a', { href: h.web_url, target: '_blank', style: { fontSize: 12, color: 'var(--info)' } }, 'View in GitLab')
                ]),
                e('td', null, (() => {
                  if (!h.variables) return '-';
                  const keys = Object.keys(h.variables || {});
                  const text = JSON.stringify(h.variables, null, 2);
                  return e('span', { className: 'vars-pill', title: '点击查看详情', onClick: () => setVarsView({ title: `Pipeline #${h.pipeline_id} 变量参数`, text }) }, [
                    e(Icon, { name: 'code', style: { fontSize: 12 } }),
                    `${keys.length} 个变量`
                  ]);
                })()),
                e('td', null, new Date(h.created_at).toLocaleString())
              ]);
            }))
          ])
        ),
        varsView && e(Drawer, {
          title: varsView.title,
          onClose: () => setVarsView(null),
          footer: [
            e('button', { className: 'btn btn-outline', onClick: () => setVarsView(null) }, '关闭')
          ]
        }, [
          e('pre', { className: 'code-pre' }, varsView.text)
        ])
      ]);
    }

    // --- 主布局 ---
    function App() {
      const [page, setPage] = useState('dashboard'); // dashboard, history, settings, detail
      const [detailId, setDetailId] = useState(null);

      const navigate = (p, id) => {
        setPage(p);
        if (id) setDetailId(id);
      };

      const renderContent = () => {
        if (page === 'settings') return e(SettingsPage);
        if (page === 'history') return e(HistoryPage);
        if (page === 'detail') return e(DeployDetail, { taskId: detailId, onBack: () => setPage('dashboard') });
        return e(DeployDashboard, { onNavigate: navigate });
      };

      return e('div', { className: 'app-layout' }, [
        // Sidebar
        e('div', { className: 'sidebar' }, [
          e('div', { className: 'brand' }, [e(Icon, { name: 'cube' }), 'NexusOps']),
          e('div', { className: 'menu' }, [
            e('div', { className: `menu-item ${page === 'dashboard' || page === 'detail' ? 'active' : ''}`, onClick: () => setPage('dashboard') }, [e(Icon, { name: 'table-columns' }), '部署大盘']),
            e('div', { className: `menu-item ${page === 'history' ? 'active' : ''}`, onClick: () => setPage('history') }, [e(Icon, { name: 'clock-rotate-left' }), '审计日志']),
            e('div', { className: `menu-item ${page === 'settings' ? 'active' : ''}`, onClick: () => setPage('settings') }, [e(Icon, { name: 'gears' }), '系统设置']),
          ]),
          e('div', { className: 'user-panel' }, [
            e('div', { className: 'avatar' }, 'A'),
            e('div', null, e('div', { style: { fontWeight: 500 } }, 'Admin'), e('div', { style: { fontSize: 12, color: '#94a3b8' } }, 'DevOps Engineer'))
          ])
        ]),
        
        // Main
        e('div', { className: 'main-content' }, [
          e('div', { className: 'top-header' }, [
            e('div', { className: 'top-header-inner' }, [
              e('div', { className: 'breadcrumb' }, [
                e('span', null, 'NexusOps'), 
                e('span', null, '/'), 
                e('span', { className: 'current' }, page === 'settings' ? '系统设置' : page === 'history' ? '审计日志' : '部署管理')
              ]),
              e('div', null, e(Icon, { name: 'bell', style: { color: '#94a3b8', cursor: 'pointer' } }))
            ])
          ]),
          e('div', { className: 'scroll-view' }, e('div', { className: 'scroll-inner' }, renderContent()))
        ])
      ]);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
