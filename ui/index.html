<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雪浪河图·工匠大模型</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <style>
    :root {
      /* 雪浪河图风格配色 */
      --primary-green: #16a34a; /* 主色调绿色 */
      --primary-green-hover: #15803d;
      --bg-body: #f3f4f6;       /* 浅灰背景 */
      --bg-card: #ffffff;       /* 纯白卡片 */
      --text-main: #111827;     /* 深色标题 */
      --text-sub: #6b7280;      /* 灰色正文 */
      --border-light: #e5e7eb;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      margin: 0; padding: 0; 
      background: var(--bg-body); 
      color: var(--text-main); 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* 顶部导航栏 */
    .navbar {
      height: 64px;
      background: #fff;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      padding: 0 32px;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: bold;
      color: #000;
      margin-right: 48px;
    }
    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--primary-green);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 900;
      font-style: italic;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      height: 100%;
    }

    .nav-item {
      display: flex;
      align-items: center;
      height: 100%;
      font-size: 15px;
      color: var(--text-main);
      cursor: pointer;
      position: relative;
      font-weight: 500;
    }
    .nav-item:hover { color: var(--primary-green); }
    .nav-item.active { color: var(--primary-green); }
    .nav-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--primary-green);
      border-radius: 3px 3px 0 0;
    }

    .user-profile {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text-sub);
    }
    .avatar {
      width: 32px;
      height: 32px;
      background: var(--primary-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
    }

    /* 主内容区 */
    .main-container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
      width: 100%;
      flex: 1;
    }

    .page-header {
      margin-bottom: 24px;
    }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      margin: 0;
    }

    /* 卡片风格 */
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      transition: box-shadow 0.2s;
    }
    .card:hover {
      box-shadow: var(--shadow-md);
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 16px 0;
      color: var(--text-main);
    }

    /* 按钮 */
    .btn {
      background: var(--primary-green);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover:not(:disabled) { background: var(--primary-green-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; background: #9ca3af; }
    
    .btn-secondary {
      background: #fff;
      color: var(--text-main);
      border: 1px solid var(--border-light);
    }
    .btn-secondary:hover:not(:disabled) {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    /* 状态标签 */
    .tag { display: inline-block; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; }
    .tag.success { background: #dcfce7; color: #166534; }  /* 浅绿底深绿字 */
    .tag.running { background: #dbeafe; color: #1e40af; }  /* 浅蓝底深蓝字 */
    .tag.failed { background: #fee2e2; color: #991b1b; }   /* 浅红底深红字 */
    .tag.canceled { background: #f3f4f6; color: #374151; } /* 浅灰底深灰字 */

    /* 表格 */
    .table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .table th { 
      text-align: left; padding: 16px; 
      color: var(--text-sub); 
      font-weight: 500; font-size: 14px; 
      border-bottom: 1px solid var(--border-light); 
      background: #f9fafb;
    }
    .table th:first-child { border-top-left-radius: 8px; }
    .table th:last-child { border-top-right-radius: 8px; }
    
    .table td { 
      padding: 16px; 
      border-bottom: 1px solid var(--border-light); 
      font-size: 14px; 
      color: var(--text-main);
    }
    .table tr:last-child td { border-bottom: none; }

    /* 消息提示 */
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: flex; align-items: center; }
    .alert-info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

    .loading { text-align: center; padding: 60px; color: var(--text-sub); }
    .link { color: var(--primary-green); text-decoration: none; font-weight: 500; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script>
    const e = React.createElement;
    const { useState, useEffect } = React;

    // --- 顶部导航栏 ---
    function Navbar({ activeTab, onTabChange }) {
      const items = [
        { id: 'deploy', label: '大模型部署管理' },
        { id: 'history', label: '部署历史记录' },
        { id: 'settings', label: '系统设置' },
      ];

      return e('div', { className: 'navbar' }, [
        e('div', { key: 'brand', className: 'brand' }, [
          e('div', { key: 'icon', className: 'brand-icon' }, 'S'),
          '雪浪河图·工匠大模型'
        ]),
        e('div', { key: 'nav', className: 'nav-links' }, 
          items.map(item => 
            e('div', { 
              key: item.id,
              className: `nav-item ${activeTab === item.id ? 'active' : ''}`,
              onClick: () => onTabChange(item.id)
            }, item.label)
          )
        ),
        e('div', { key: 'user', className: 'user-profile' }, [
          e('div', { key: 'avatar', className: 'avatar' }, 'U'),
          e('span', { key: 'name' }, 'Admin'),
          e('span', { key: 'divider' }, '|'),
          e('span', { key: 'logout', style: { cursor: 'pointer' } }, '退出')
        ])
      ]);
    }

    // --- 部署历史列表 ---
    function HistoryList() {
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const fetchHistory = async () => {
        try {
          const r = await fetch('/api/pipelines');
          const j = await r.json();
          if (j.ok) {
            setList(j.pipelines || []);
          } else {
            setError(j.error);
          }
        } catch (err) {
          setError('无法连接到服务器');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { fetchHistory(); }, []);

      if (loading) return e('div', { className: 'loading' }, '正在加载历史记录...');
      if (error) return e('div', { className: 'alert alert-error' }, error);

      return e('div', { className: 'card' }, [
        e('div', { key: 'header', style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 } }, [
          e('div', { className: 'card-title', style: { margin: 0 } }, '部署执行记录'),
          e('button', { className: 'btn btn-secondary', onClick: fetchHistory }, '刷新列表')
        ]),
        e('table', { className: 'table' }, [
          e('thead', null, e('tr', null, [
            e('th', null, '状态'),
            e('th', null, 'Pipeline ID'),
            e('th', null, '触发分支'),
            e('th', null, '创建时间'),
            e('th', null, '操作')
          ])),
          e('tbody', null, list.map(p => {
            const statusMap = { success: 'success', running: 'running', failed: 'failed', canceled: 'canceled' };
            const cls = statusMap[p.status] || 'canceled';
            return e('tr', { key: p.id }, [
              e('td', null, e('span', { className: `tag ${cls}` }, p.status)),
              e('td', null, `#${p.id}`),
              e('td', null, p.ref),
              e('td', null, new Date(p.created_at).toLocaleString()),
              e('td', null, e('a', { href: p.web_url, target: '_blank', className: 'link' }, '查看详情 →'))
            ]);
          }))
        ])
      ]);
    }

    // --- 部署管理面板 ---
    function DeployPanel() {
      const [busy, setBusy] = useState(false);
      const [msg, setMsg] = useState(null);
      const [status, setStatus] = useState(null);

      const refresh = async () => {
        try {
          const r = await fetch('/api/status');
          const j = await r.json();
          if (j.ok) setStatus(j);
        } catch (e) {}
      };

      const deploy = async () => {
        if (busy) return;
        setBusy(true);
        setMsg({ type: 'info', text: '正在发送触发指令...' });
        try {
          const r = await fetch('/api/deploy', { method: 'POST' });
          const j = await r.json();
          if (j.ok) {
            setMsg({ type: 'success', text: '部署指令已发送，流水线正在初始化...' });
            setStatus({ pipeline: j.pipeline, web_url: j.web_url });
          } else {
            setMsg({ type: 'error', text: '部署失败: ' + (j.error || '未知错误') });
          }
        } catch (e) {
          setMsg({ type: 'error', text: '请求失败，请检查网络' });
        } finally {
          setBusy(false);
        }
      };

      useEffect(() => {
        refresh();
        const t = setInterval(refresh, 10000);
        return () => clearInterval(t);
      }, []);

      return e('div', null, [
        // 顶部操作卡片
        e('div', { className: 'card', style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' } }, [
          e('div', null, [
            e('div', { className: 'card-title' }, '大模型应用部署'),
            e('div', { style: { color: 'var(--text-sub)', fontSize: 14 } }, '一键触发 master 分支的自动化部署流程，部署过程大约需要 3-5 分钟。')
          ]),
          e('div', { style: { display: 'flex', gap: 12 } }, [
            e('button', { className: 'btn btn-secondary', disabled: busy, onClick: refresh }, '刷新状态'),
            e('button', { className: 'btn', disabled: busy, onClick: deploy, style: { minWidth: 120 } }, busy ? '执行中...' : '立即部署')
          ])
        ]),

        // 消息提示
        msg ? e('div', { className: `alert alert-${msg.type}` }, msg.text) : null,

        // 状态详情卡片
        e('div', { className: 'card' }, [
          e('div', { className: 'card-title' }, '当前环境状态'),
          status ? (status.pipeline ? e('div', { style: { display: 'flex', gap: 40 } }, [
             e('div', null, [
               e('div', { style: { fontSize: 13, color: 'var(--text-sub)', marginBottom: 4 } }, '最新流水线状态'),
               e('span', { className: 'tag ' + (status.pipeline.status === 'success' ? 'success' : 'running') }, status.pipeline.status)
             ]),
             e('div', null, [
               e('div', { style: { fontSize: 13, color: 'var(--text-sub)', marginBottom: 4 } }, 'Pipeline ID'),
               e('strong', null, `#${status.pipeline.id}`)
             ]),
             e('div', null, [
               e('div', { style: { fontSize: 13, color: 'var(--text-sub)', marginBottom: 4 } }, '触发分支'),
               e('code', { style: { background: '#f3f4f6', padding: '2px 6px', borderRadius: 4 } }, status.pipeline.ref)
             ]),
             status.web_url ? e('div', { style: { marginLeft: 'auto', alignSelf: 'center' } }, 
               e('a', { href: status.web_url, target: '_blank', className: 'link' }, '跳转 GitLab 查看日志 →')
             ) : null
          ]) : e('div', { style: { color: 'var(--text-sub)', fontStyle: 'italic' } }, '暂无最近的部署记录')) : e('div', { className: 'loading', style: { padding: 20 } }, '加载中...')
        ])
      ]);
    }

    // --- 主应用 ---
    function App() {
      const [tab, setTab] = useState('deploy');

      const renderContent = () => {
        switch (tab) {
          case 'deploy': return e(DeployPanel);
          case 'history': return e(HistoryList);
          case 'settings': return e('div', { className: 'card' }, '系统设置模块（建设中...）');
          default: return null;
        }
      };

      return [
        e(Navbar, { key: 'navbar', activeTab: tab, onTabChange: setTab }),
        e('div', { key: 'main', className: 'main-container' }, [
          e('div', { key: 'page-header', className: 'page-header' }, 
            // 标题可根据 Tab 动态变化，或者保持固定
            // e('h2', { className: 'page-title' }, tab === 'deploy' ? '大模型部署管理' : '部署历史记录')
            null 
          ),
          renderContent()
        ])
      ];
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
